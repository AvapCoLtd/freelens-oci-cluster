# freelens-oci-cluster の CI。
#
#   push/MR  → test (make lint + make test)
#   master   → test → mirror (GitHub へ force-push)
#   tag      → test → version → build (make pack) → publish (GitLab Generic Package Registry)
#              → mirror (GitHub) → release (GitLab) + github-release (GitHub Releases)
#
# GitHub 連携(mirror / github-release)は CI 変数 GH_APP_ID / GH_APP_PRIVATE_KEY が
# あるときだけ走る(ci/github.sh 参照。App: freelens-plugins-release、鍵の正は bao)。
#
# イメージは avap.plus のプロキシキャッシュ経由で取る(このインスタンスの作法)。

stages:
  - test
  - build
  - publish
  - release

variables:
  PLUGIN: freelens-oci-cluster

test:
  stage: test
  image: avap.plus/dockerhub/library/docker:28.4.0
  tags: [dind]
  before_script:
    - apk add --no-cache make jq >/dev/null
  script:
    - make lint
    - make test
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

version:
  stage: test
  image: avap.plus/dockerhub/library/alpine:3
  before_script:
    - apk add --no-cache jq >/dev/null
  script:
    - |
      PKG_VERSION=$(jq -r .version package.json)
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      echo "package.json: ${PKG_VERSION} / tag: ${CI_COMMIT_TAG} -> ${TAG_VERSION}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "error: タグ (${TAG_VERSION}) と package.json の version (${PKG_VERSION}) が一致しません。" >&2
        exit 1
      fi
      echo "VERSION=${TAG_VERSION}" > version.env
  artifacts:
    reports:
      dotenv: version.env
  rules:
    - if: $CI_COMMIT_TAG

build:
  stage: build
  image: avap.plus/dockerhub/library/docker:28.4.0
  tags: [dind]
  needs:
    - job: version
      artifacts: true
  before_script:
    - apk add --no-cache make jq >/dev/null
  script:
    - make pack
    - TGZ_PATH=$(ls ./*.tgz | head -1)
    - TGZ_NAME=$(basename "${TGZ_PATH}")
    - sha256sum "${TGZ_PATH}" > "${TGZ_PATH}.sha256"
    - echo "TGZ_NAME=${TGZ_NAME}" > build.env
  artifacts:
    paths:
      - "*.tgz"
      - "*.tgz.sha256"
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

publish:
  stage: publish
  image: avap.plus/dockerhub/library/alpine:3
  before_script:
    - apk add --no-cache curl >/dev/null
  needs:
    - job: build
      artifacts: true
    - job: version
      artifacts: true
  script:
    - |
      BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PLUGIN}/${VERSION}"
      for f in "${TGZ_NAME}" "${TGZ_NAME}.sha256"; do
        curl --fail --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${f}" "${BASE}/${f}"
      done
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  # release-cli は dockerhub ではなく gitlab.com のレジストリにある
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: publish
    - job: version
      artifacts: true
    - job: build
      artifacts: true
  script:
    - echo "リリース ${CI_COMMIT_TAG} (${VERSION}) を作成します"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "${PLUGIN} ${CI_COMMIT_TAG}"
    description: |
      FreeLens の Extensions 画面にドラッグ&ドロップしてインストールできる .tgz。

      公開配布は GitHub Releases:
      https://github.com/AvapCoLtd/${PLUGIN}/releases/tag/${CI_COMMIT_TAG}
    assets:
      links:
        - name: "${TGZ_NAME}"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PLUGIN}/${VERSION}/${TGZ_NAME}"
          link_type: package
        - name: "${TGZ_NAME}.sha256"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PLUGIN}/${VERSION}/${TGZ_NAME}.sha256"
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG

# ---- GitHub 公開配布 ----------------------------------------------------

mirror:
  stage: publish
  image: avap.plus/dockerhub/library/alpine:3
  before_script:
    - apk add --no-cache git curl openssl >/dev/null
  needs:
    - job: test
  script:
    - sh ci/github.sh mirror
  rules:
    - if: '$GH_APP_ID == null'
      when: never
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

github-release:
  stage: release
  image: avap.plus/dockerhub/library/alpine:3
  before_script:
    - apk add --no-cache curl openssl >/dev/null
  needs:
    - job: mirror
    - job: build
      artifacts: true
    - job: version
      artifacts: true
  script:
    - sh ci/github.sh release "$CI_COMMIT_TAG"
  rules:
    - if: '$GH_APP_ID == null'
      when: never
    - if: $CI_COMMIT_TAG
